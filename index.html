<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELMA – Vertriebskarte</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bg:#0d0f14;--surface:#161921;--surface2:#1e2330;--border:#2a2f3d;--text:#e8eaf0;--muted:#7a8099;--accent:#c8a84b;}
*{margin:0;padding:0;box-sizing:border-box;
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-family:'Syne',sans-serif;font-weight:800;font-size:17px;letter-spacing:.08em;color:var(--accent);}
.logo span{color:var(--muted);font-weight:400;font-size:12px;margin-left:8px;}
.counter{font-size:12px;color:var(--muted);}
.counter strong{color:var(--text);}
.main{display:flex;flex:1;overflow:hidden;}
.sidebar{width:280px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow:hidden;}
.sidebar-top{padding:12px;}
.search-box{position:relative;}
.search-box input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px 8px 32px;border-radius:7px;font-size:13px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.search-box input:focus{border-color:var(--accent);}
.search-box input::placeholder{color:var(--muted);}
.s-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:13px;pointer-events:none;}
.filters{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px;}
.fb{display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;border:1.5px solid;background:transparent;cursor:pointer;font-size:11px;font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s;color:var(--text);}
.fd{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.fb.active{color:#fff;}
.fb[data-c="A-Kunden"]{border-color:#0288D1;}.fb[data-c="A-Kunden"].active{background:#0288D1;}
.fb[data-c="B-Kunden"]{border-color:#FFD600;color:#ccc;}.fb[data-c="B-Kunden"].active{background:#FFD600;color:#111;}
.fb[data-c="C-Kunden"]{border-color:#7CB342;}.fb[data-c="C-Kunden"].active{background:#7CB342;}
.fb[data-c="D-Kunden"]{border-color:#9C27B0;}.fb[data-c="D-Kunden"].active{background:#9C27B0;}
.list-hd{padding:8px 12px;font-size:10px;font-weight:600;letter-spacing:.08em;color:var(--muted);text-transform:uppercase;border-bottom:1px solid var(--border);}
.ml{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border) transparent;}
.ml::-webkit-scrollbar{width:3px;}.ml::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.li{display:flex;align-items:center;gap:9px;padding:9px 12px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.04);transition:background .12s;}
.li:hover{background:var(--surface2);}
.li.hl{background:rgba(200,168,75,.08);}
.ld{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.lt{overflow:hidden;}
.ln{font-size:12px;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.la{font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.no-r{padding:20px 12px;text-align:center;color:var(--muted);font-size:13px;}
#map{flex:1;background:#1a1e2a;}
.leaflet-popup-content-wrapper{background:var(--surface2);color:var(--text);border-radius:10px;border:1px solid var(--border);box-shadow:0 8px 32px rgba(0,0,0,.5);font-family:'DM Sans',sans-serif;}
.leaflet-popup-tip{background:var(--surface2);}
.leaflet-popup-content{margin:12px 14px;min-width:180px;}
.pc{font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:3px;}
.pn{font-family:'Syne',sans-serif;font-weight:700;font-size:13px;line-height:1.3;margin-bottom:5px;}
.pa{font-size:11px;color:var(--muted);line-height:1.4;}
</style>
</head>
<body>
<header>
  <div class="logo">ELMA <span>Vertriebskarte</span></div>
  <div class="counter"><strong id="vc">0</strong> / <strong id="tc">0</strong> Kunden</div>
</header>
<div class="main">
  <div class="sidebar">
    <div class="sidebar-top">
      <div class="search-box">
        <span class="s-icon">🔍</span>
        <input type="text" id="si" placeholder="Name oder Ort suchen…">
      </div>
    </div>
    <div class="filters">
      <button class="fb active" data-c="A-Kunden"><span class="fd" style="background:#0288D1"></span>A-Kunden</button>
      <button class="fb active" data-c="B-Kunden"><span class="fd" style="background:#FFD600"></span>B-Kunden</button>
      <button class="fb active" data-c="C-Kunden"><span class="fd" style="background:#7CB342"></span>C-Kunden</button>
      <button class="fb active" data-c="D-Kunden"><span class="fd" style="background:#9C27B0"></span>D-Kunden</button>
    </div>
    <div class="list-hd" id="lhd">Alle Kunden</div>
    <div class="ml" id="ml"></div>
  </div>
  <div id="map"></div>
</div>

const map = L.map('map',{center:[51.1,12.4],zoom:8});
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png',{
  attribution:'© <a href="https://openstreetmap.org/copyright">OpenStreetMap</a>',
  maxZoom:19
}).addTo(map);

const active=new Set(['A-Kunden','B-Kunden','C-Kunden','D-Kunden']);
let q='';
const leafletMarkers={};

function icon(color){
  const s=`<svg xmlns="http://www.w3.org/2000/svg" width="22" height="30" viewBox="0 0 22 30"><path d="M11 0C4.925 0 0 4.925 0 11c0 8.25 11 19 11 19s11-10.75 11-19C22 4.925 17.075 0 11 0z" fill="${color}" stroke="rgba(0,0,0,.3)" stroke-width="1.2"/><circle cx="11" cy="11" r="4.5" fill="white" opacity=".85"/></svg>`;
  return L.divIcon({html:s,iconSize:[22,30],iconAnchor:[11,30],popupAnchor:[0,-30],className:''});
}

DATA.forEach((d,i)=>{
  if(d.lat===null||d.lon===null) return;
  const m=L.marker([d.lat,d.lon],{icon:icon(d.color)});
  m.bindPopup(`<div class="pc" style="color:${d.color}">${d.category}</div><div class="pn">${d.name}</div><div class="pa">${d.address||'–'}</div>`);
  m.addTo(map);
  leafletMarkers[i]=m;
});

function renderList(){
  const ml=document.getElementById('ml');
  ml.innerHTML='';
  const filtered=DATA.map((d,i)=>({d,i})).filter(({d})=>{
    if(!active.has(d.category)) return false;
    if(!q) return true;
    return d.name.toLowerCase().includes(q)||d.address.toLowerCase().includes(q);
  });
  document.getElementById('lhd').textContent=`${filtered.length} Kunden`;
  document.getElementById('vc').textContent=filtered.length;
  if(!filtered.length){ml.innerHTML='<div class="no-r">Keine Treffer</div>';return;}
  filtered.forEach(({d,i})=>{
    const el=document.createElement('div');
    el.className='li';el.dataset.i=i;
    el.innerHTML=`<div class="ld" style="background:${d.color}"></div><div class="lt"><div class="ln">${d.name}</div><div class="la">${d.address||'–'}</div></div>`;
    el.onclick=()=>{
      document.querySelectorAll('.li').forEach(e=>e.classList.remove('hl'));
      el.classList.add('hl');el.scrollIntoView({block:'nearest'});
      if(leafletMarkers[i]){map.flyTo([d.lat,d.lon],14,{duration:.7});leafletMarkers[i].openPopup();}
    };
    ml.appendChild(el);
  });
}

document.querySelectorAll('.fb').forEach(b=>{
  b.onclick=()=>{
    const c=b.dataset.c;
    if(active.has(c)){active.delete(c);b.classList.remove('active');}
    else{active.add(c);b.classList.add('active');}
    DATA.forEach((d,i)=>{
      if(!leafletMarkers[i]) return;
      if(active.has(d.category)){if(!map.hasLayer(leafletMarkers[i]))leafletMarkers[i].addTo(map);}
      else{if(map.hasLayer(leafletMarkers[i]))map.removeLayer(leafletMarkers[i]);}
    });
    renderList();
  };
});

document.getElementById('si').oninput=e=>{q=e.target.value.toLowerCase();renderList();};

document.getElementById('tc').textContent=DATA.length;
renderList();
</script>
